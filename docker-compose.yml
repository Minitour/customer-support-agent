services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:1.0.20
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000; printf 'GET /api/v2/heartbeat HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3; head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override with Docker-internal service names
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/support_agent
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      PRODUCTS_JSON_PATH: /app/.data/products.json
      POLICY_DIR_PATH: /app/.data/policy
    volumes:
      - ./.data:/app/.data:ro
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
